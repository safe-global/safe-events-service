version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
        update-types:
          - minor
          - patch
      typescript-toolchain:
        patterns:
          - "typescript"
          - "ts-jest"
          - "ts-node"
          - "ts-loader"
          - "tsconfig-paths"
          - "@types/*"
        update-types:
          - minor
          - patch
      lint-and-format:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "prettier"
          - "typescript-eslint"
          - "@typescript-eslint/*"
        update-types:
          - minor
          - patch
      adminjs:
        patterns:
          - "adminjs"
          - "@adminjs/*"
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
